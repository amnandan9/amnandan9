<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #abd200; }
    .bold { font: 700 28px 'Segoe UI', Ubuntu, Sans-Serif; fill: #68b587; text-anchor: middle; }
    .sub { font: 400 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #68b587; text-anchor: middle; }
  </style>
  <rect x="0.5" y="0.5" rx="4.5" height="194" width="494" fill="#0a0f0b" stroke="#203a27" stroke-width="1"/>
  
  <text x="25" y="35" class="header">GitHub Streak</text>
  
  <g transform="translate(80, 110)">
    <text x="0" y="-20" class="sub">Total Contributions</text>
    <text x="0" y="10" class="bold">1.2k</text>
    <text x="0" y="30" class="sub">Mar 10 - Present</text>
  </g>
  
  <g transform="translate(250, 110)">
    <circle cx="0" cy="-10" r="40" fill="none" stroke="#b7d364" stroke-width="4" />
    <text x="0" y="-20" class="sub">Current Streak</text>
    <text x="0" y="10" class="bold" fill="#b7d364">42</text>
    <text x="0" y="45" class="sub">Days</text>
  </g>

  <g transform="translate(410, 110)">
    <text x="0" y="-20" class="sub">Longest Streak</text>
    <text x="0" y="10" class="bold">68</text>
    <text x="0" y="30" class="sub">Jan 1 - Mar 8</text>
  </g>
</svg>
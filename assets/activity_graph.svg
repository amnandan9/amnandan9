<svg width="1000" height="200" viewBox="0 0 1000 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #abd200; }
    .lbl { font: 400 12px 'Segoe UI'; fill: #68b587; }
  </style>
  <rect x="0.5" y="0.5" rx="4.5" height="194" width="999" fill="#0a0f0b" stroke="#203a27" stroke-width="1"/>
  <text x="25" y="35" class="header">Activity Graph (Last 30 Days)</text>
  
  <!-- Activity Wave -->
  <path d="M 50 150 C 150 150, 200 80, 300 100 C 400 120, 450 60, 550 90 C 650 120, 700 70, 800 130 C 850 160, 950 110, 950 110" stroke="#abd200" stroke-width="3" fill="none" />
  
  <circle cx="50" cy="150" r="4" fill="#b7d364" />
  <circle cx="300" cy="100" r="4" fill="#b7d364" />
  <circle cx="550" cy="90" r="4" fill="#b7d364" />
  <circle cx="800" cy="130" r="4" fill="#b7d364" />
  <circle cx="950" cy="110" r="4" fill="#b7d364" />

  <!-- Grid lines -->
  <line x1="50" y1="170" x2="950" y2="170" stroke="#203a27" stroke-width="1"/>
  <text x="50" y="185" class="lbl" text-anchor="middle">10</text>
  <text x="300" y="185" class="lbl" text-anchor="middle">15</text>
  <text x="550" y="185" class="lbl" text-anchor="middle">20</text>
  <text x="800" y="185" class="lbl" text-anchor="middle">25</text>
  <text x="950" y="185" class="lbl" text-anchor="middle">30</text>
</svg>